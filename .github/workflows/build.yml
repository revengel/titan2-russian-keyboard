# ========================================
# GitHub Actions — автоматическая сборка APK
# ========================================
#
# При push, pull request или создании релиза
# GitHub автоматически запускает этот workflow.
# ========================================

name: Build Android APK

# События, запускающие workflow
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [ published ]

env:
  # upload-artifact@v5 и setup-gradle@v5 ещё на Node.js 20
  # форсируем переход на Node.js 24
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Job 1: Сборка APK
  build:
    name: Build APK
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # Клонирование репозитория
      - name: Checkout code
        uses: actions/checkout@v5

      # Установка JDK 21
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      # Настройка Gradle (кэш + установка нужной версии)
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: '8.13'

      # Декодирование релизного кейстора из секрета
      - name: Decode release keystore
        run: |
          echo "$RELEASE_KEYSTORE" | base64 -d > $GITHUB_WORKSPACE/release.jks
        env:
          RELEASE_KEYSTORE: ${{ secrets.RELEASE_KEYSTORE }}

      # Сборка релизного APK
      - name: Build with Gradle
        run: gradle assembleRelease
        env:
          RELEASE_KEYSTORE_FILE: ${{ github.workspace }}/release.jks
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      # Сохранение APK как артефакт (доступен в Actions)
      - name: Upload APK artifact
        uses: actions/upload-artifact@v5
        with:
          name: app-release
          path: app/build/outputs/apk/release/*.apk

  # Job 2: Загрузка APK в релиз GitHub
  release:
    name: Upload to Release
    needs: build
    runs-on: ubuntu-latest
    # Запускается только при создании релиза
    if: github.event_name == 'release'
    permissions:
      contents: write

    steps:
      # Скачивание собранного APK
      - name: Download APK
        uses: actions/download-artifact@v5
        with:
          name: app-release
          path: apk/

      # Прикрепление APK к релизу на GitHub
      - name: Upload APK to release
        uses: softprops/action-gh-release@v2
        with:
          files: apk/*.apk
